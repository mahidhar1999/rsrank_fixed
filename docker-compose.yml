version: "3.9"

services:

  # ── PostgreSQL ──────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Mahidhar@1999}
      POSTGRES_DB:       ${DB_NAME:-rsrank_in}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/sql/001_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./backend/sql/002_functions.sql:/docker-entrypoint-initdb.d/02_functions.sql
      - ./backend/migrations/002_seed_indices.sql:/docker-entrypoint-initdb.d/03_seed.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ─────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST:     db
      DB_PORT:     5432
      DB_USER:     ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-Mahidhar@1999}
      DB_NAME:     ${DB_NAME:-rsrank_in}
      SECRET_KEY: ${SECRET_KEY}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      CORS_ORIGINS:            ${CORS_ORIGINS:-http://localhost:5173}
      APP_ENV:                 ${APP_ENV:-production}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/logs:/app/logs

  # ── React Frontend (served via nginx) ──────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  pgdata:
